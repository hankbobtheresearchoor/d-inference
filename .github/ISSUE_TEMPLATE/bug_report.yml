name: Bug report
description: Report a defect in d-inference (coordinator, provider, console UI, app, image bridge, etc.)
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete the repro, the faster we can fix it.

        Before filing, please search [existing issues](https://github.com/Layr-Labs/d-inference/issues?q=is%3Aissue) to avoid duplicates.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - coordinator (Go)
        - provider (Rust, legacy)
        - provider-swift (Swift CLI)
        - console-ui (Next.js)
        - enclave (Swift Secure Enclave helper)
        - infra / deploy / CI
        - docs
        - not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error messages or unexpected output.
      placeholder: e.g. provider crashed with X after running `eigeninference-provider serve` on a fresh M2 Air
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Install v0.3.5 via the install.sh one-liner
        2. Run `eigeninference-provider serve --model llama-3.1-8b-instruct`
        3. Send a chat completion from the console UI
        4. Observe the failure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Anything relevant to reproducing this — provider version (`eigeninference-provider --version`), macOS version, Mac model + RAM, browser (for console UI bugs), etc.
      placeholder: |
        - provider: v0.3.5
        - macOS: 15.4 (Sequoia)
        - hardware: MacBook Pro M3 Pro, 36 GB
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. For provider crashes, include the last ~50 lines of `~/Library/Logs/eigeninference-provider/*.log`. Use code fences and redact anything sensitive.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
